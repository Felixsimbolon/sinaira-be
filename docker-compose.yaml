services:
  sinaira-db:
    image: postgres:17.5-alpine 
    ports:
      - '35001:5432'
    restart: 'no'
    environment:
      - POSTGRES_USER=sinaira-dev
      - POSTGRES_PASSWORD=sinaira
      - POSTGRES_DB=sinaira-dev
    volumes:
      - sinaira-db:/var/lib/postgresql/data
volumes:
  sinaira-db:
    driver: local
